# DoMINO-Transformed: token-direct geometry encoding + hierarchical fusion.
# Same data/train/eval layout as Domino; model uses domino_transformed.

# ┌───────────────────────────────────────────┐
# │            Project Details                │
# └───────────────────────────────────────────┘  
project:
  name: DrivAerML_Dataset_Transformed

exp_tag: 1
project_dir: outputs/${project.name}/
output: outputs/${project.name}/${exp_tag}

hydra:
  run:
    dir: ${output}
  output_subdir: hydra

resume_dir: ${output}/models

# ┌───────────────────────────────────────────┐
# │            Data Preprocessing             │
# └───────────────────────────────────────────┘  
data_processor:
  kind: drivaer_aws
  output_dir: /user/aws_data_all/
  input_dir: /data/drivaer_aws/drivaer_data_full/
  cached_dir: /user/cached/drivaer_aws/drivaer_data_full/
  use_cache: false
  num_processors: 12

# ┌───────────────────────────────────────────┐
# │            Solution variables             │
# └───────────────────────────────────────────┘  
variables:
  surface:
    solution:
      pMeanTrim: scalar
      wallShearStressMeanTrim: vector
  volume:
    solution:
      UMeanTrim: vector
      pMeanTrim: scalar
      nutMeanTrim: scalar
  global_parameters:
    inlet_velocity:
      type: vector
      reference: [30.00]
    air_density:
      type: scalar
      reference: 1.205

# ┌───────────────────────────────────────────┐
# │         Data Configs                      │
# └───────────────────────────────────────────┘  
data:
  input_dir: /lustre/fsw/portfolios/coreai/projects/coreai_modulus_cae/datasets/drivaer_aws/domino/train/
  input_dir_val: /lustre/fsw/portfolios/coreai/projects/coreai_modulus_cae/datasets/drivaer_aws/domino/val/
  gpu_preprocessing: true
  gpu_output: true
  normalize_coordinates: true
  sampling: true
  scaling_factors: ${project_dir}/scaling_factors/scaling_factors.pkl
  volume_sample_from_disk: true
  max_samples_for_statistics: 200

# ┌───────────────────────────────────────────┐
# │          Domain Parallelism Settings      │
# └───────────────────────────────────────────┘  
domain_parallelism:
  domain_size: 1
  shard_grid: false
  shard_points: false

# ┌───────────────────────────────────────────┐
# │          Model Parameters                 │
# └───────────────────────────────────────────┘  
model:
  model_type: combined
  activation: "gelu"
  loss_function: 
    loss_type: "mse"
    area_weighing_factor: 10000
  use_sdf_in_basis_func: true
  volume_points_sample: 8192
  surface_points_sample: 8192
  surface_sampling_algorithm: area_weighted
  geom_points_sample: 300_000
  num_neighbors_surface: 7
  num_neighbors_volume: 10
  return_volume_neighbors: false
  use_surface_normals: true
  use_surface_area: true
  integral_loss_scaling_factor: 100
  normalization: min_max_scaling
  encode_parameters: false
  surf_loss_scaling: 5.0
  vol_loss_scaling: 1.0
  geometry_encoding_type: both
  solution_calculation_mode: two-loop
  position_encoder_base_neurons: 0
  # Geometry representation: token-direct path (cross ball query + Transolver)
  geometry_rep:
    use_token_direct: true
    token_hidden_dim: 256
    transolver_depth: 2
    transolver_slice_num: 32
    transolver_num_heads: 4
    transolver_dropout: 0.0
    transolver_use_te: false
    geo_conv:
      volume_radii: [0.1, 0.5, 1.0, 2.5]
      surface_radii: [0.01, 0.05, 1.0]
      volume_neighbors_in_radius: [32, 64, 128, 256]
      surface_neighbors_in_radius: [8, 16, 128]
      activation: ${model.activation}
    geo_processor:
      activation: ${model.activation}
      self_attention: false
      cross_attention: false
  geometry_local:
    volume_neighbors_in_radius: [64, 128]
    surface_neighbors_in_radius: [32, 128]
    volume_radii: [0.1, 0.25]
    surface_radii: [0.05, 0.25]
    base_layer: 512
  # Hierarchical fusion: basis + geometry -> Stage1; FiLM from global -> Stage2
  fusion:
    use_hierarchical_fusion: true
    fusion_dim: 512
    geometry_dim_volume: 192
    geometry_dim_surface: 160
    global_embed_dim: 64
    stage1_hidden: null
    film_hidden: null
  nn_basis_functions:
    base_layer: 512
    fourier_features: true
    num_modes: 5
    activation: ${model.activation}
  aggregation_model:
    base_layer: 512
    activation: ${model.activation}
  parameter_model:
    base_layer: 512
    fourier_features: false
    num_modes: 5
    activation: ${model.activation}

# ┌───────────────────────────────────────────┐
# │          Training Configs                 │
# └───────────────────────────────────────────┘  
train:
  epochs: 1000
  checkpoint_interval: 2
  dataloader:
    batch_size: 1
    preload_depth: 1
    pin_memory: True
  sampler:
    shuffle: true
    drop_last: false
  checkpoint_dir: /user/models/
  add_physics_loss: false
  lr_scheduler:
    name: MultiStepLR
    milestones: [50, 200, 400, 500, 600, 700, 800, 900]
    gamma: 0.5
    T_max: ${train.epochs}
    eta_min: 1e-6
  optimizer:
    name: Adam
    lr: 0.001
    weight_decay: 0.0
  amp:
    enabled: true
    autocast:
      dtype: torch.float16
    scaler:
      _target_: torch.cuda.amp.GradScaler
      enabled: ${..enabled}
    clip_grad: true
    grad_max_norm: 2.0

# ┌───────────────────────────────────────────┐
# │          Validation Configs               │
# └───────────────────────────────────────────┘  
val:
  dataloader:
    batch_size: 1
    preload_depth: 1
    pin_memory: true
  sampler:
    shuffle: true
    drop_last: false

# ┌───────────────────────────────────────────┐
# │          Testing data Configs             │
# └───────────────────────────────────────────┘  
eval:
  test_path: /user/testing_data
  save_path: /user/predicted_data
  checkpoint_name: DoMINO.0.455.pt
  scaling_param_path: /user/scaling_params
  refine_stl: False
  num_points: 1_240_000
